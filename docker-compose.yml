# docker-compose.yml
services:
  resin:
    image: ghcr.io/oneadms/resin:1.1.2
    container_name: resin
    restart: unless-stopped
    environment:
      RESIN_AUTH_VERSION: "V1" # Required: LEGACY_V0 or V1
      RESIN_ADMIN_TOKEN: "aaa10247878=-" # Change to your admin dashboard password
      RESIN_PROXY_TOKEN: "aaa10247878=-" # Change to your proxy password
      RESIN_LISTEN_ADDRESS: 0.0.0.0
      RESIN_PORT: 2260
    ports:
      - "2260:2260"
    volumes:
      - ./data/cache:/var/cache/resin
      - ./data/state:/var/lib/resin
      - ./data/log:/var/log/resin
